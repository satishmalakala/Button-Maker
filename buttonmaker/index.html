<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Maker</title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
</head>

<body>


    <div class="button-sec">
        <div class="container">
            <h1>
                Button Maker
            </h1>

            <div class="btn-blk">
                <p>BackgroundColor</p>
                <input type="text" name="" id="bgColor">
                <p>fontColor</p>
                <input type="text" name="" id="fontColor">
                <p>Padding</p>
                <input type="text" id="btnPadding">
                <p>fontSize</p>
                <input type="text" id="fontSize">
                <p>Font Weight</p>
                <input type="text" id="fontWeight">

                <p>border radius</p>
                <input type="text" id="borderRadius">

            </div>

            <div class="apply-btn text-center mb-5">
                <button class="btn btn-primary" onclick="applyStyles()">Apply</button>
            </div>

            <button id="customButton">custom Button</button>

        </div>
    </div>



    <script src="button.js"></script>
</body>

</html>
